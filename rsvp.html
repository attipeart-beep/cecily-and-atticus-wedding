<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP · Cecily &amp; Atticus</title>
  <meta name="description" content="Please RSVP to Cecily & Atticus's wedding on 10th December 2026." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital@0;1&family=Dawning+of+a+New+Day&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=25" />
  <script>document.documentElement.classList.add('js');</script>
</head>
<body>

  <header class="site-header">
    <div class="nav-inner nav-inner-home">
      <a class="brand" href="index.html">C<span>&amp;</span>A</a>
    </div>
  </header>

  <section class="page-banner">
    <h1 class="script">Please <span style="font-size:1.28em">R</span>SVP</h1>
    <p>We&rsquo;d be grateful for your reply by <strong>1st August 2026</strong></p>
  </section>

  <section class="section bg-cream" style="padding-top:2.5rem;padding-bottom:1.25rem">
    <div class="inner">

      <div class="rsvp-badge reveal">
        <span class="script"><span style="font-size:1.28em">R</span>SVP</span>
      </div>

      <!-- =====================================================
           NETLIFY FORMS
           This form is handled by Netlify automatically once the
           site is deployed there - no API keys or third-party
           account needed. Submissions are emailed to you and also
           stored under Forms in the Netlify dashboard.
           After your first deploy, go to:
             Netlify → Site → Forms → rsvp → Settings & notifications
           and add an email notification to cecandatti@gmail.com.
           (Locally the form runs in demo mode and just shows the
           thank-you message.)
           ===================================================== -->
      <form id="rsvp-form" class="form reveal"
            name="rsvp"
            method="POST"
            action="/"
            data-netlify="true"
            netlify-honeypot="bot-field">

        <!-- Tells Netlify which form this submission belongs to -->
        <input type="hidden" name="form-name" value="rsvp" />
        <!-- Netlify uses a field literally named "subject" as the email
             subject line. JS fills this at submit time with the responder's
             first name(s), e.g. "New RSVP from Jane & John". No dashboard
             template needed - this overrides the UI subject. -->
        <input type="hidden" name="subject" id="rsvp-subject" value="New RSVP" />
        <!-- Honeypot: hidden from people, catches spam bots -->
        <p hidden><label>Don&rsquo;t fill this out if you&rsquo;re human: <input name="bot-field" /></label></p>

        <div class="field">
          <label for="g1name">Your full name <span class="req">*</span></label>
          <input type="text" id="g1name" name="guest_1_name" required />
        </div>

        <div class="field">
          <label for="g1email">Your email <span class="req">*</span></label>
          <input type="email" id="g1email" name="guest_1_email" required />
        </div>

        <div class="field">
          <label>Will you be joining us? <span class="req">*</span></label>
          <div class="radio-row">
            <label class="radio-pill">
              <input type="radio" name="guest_1_attending" value="Joyfully Accept" required />
              <span><span class="pill-label">Joyfully<br />Accept</span></span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="guest_1_attending" value="Regretfully Decline" />
              <span><span class="pill-label">Regretfully<br />Decline</span></span>
            </label>
          </div>
        </div>

        <!-- Guest 1's dietary needs - shown once they accept -->
        <div class="field" id="g1-diet" hidden>
          <label for="dietary1">Your dietary requirements or allergies</label>
          <input type="text" id="dietary1" name="dietary_1" placeholder="e.g. vegetarian, vegan, nut allergy, etc." />
        </div>

        <!-- Everything below is revealed only once the question above is answered -->
        <div id="rsvp-more" hidden>

          <div class="field">
            <label>Are you also responding for a second guest?</label>
            <div class="radio-row">
              <label class="radio-pill">
                <input type="radio" name="has_guest_2" value="Yes" />
                <span>Yes</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="has_guest_2" value="No" />
                <span>No, just me</span>
              </label>
            </div>
          </div>

          <div id="guest2-fields" hidden>
            <div class="field">
              <label for="g2name">Second guest&rsquo;s full name</label>
              <input type="text" id="g2name" name="guest_2_name" />
            </div>
            <div class="field">
              <label for="g2email">Second guest&rsquo;s email</label>
              <input type="email" id="g2email" name="guest_2_email" />
            </div>
            <div class="field">
              <label>Will they be joining us?</label>
              <div class="radio-row">
                <label class="radio-pill">
                  <input type="radio" name="guest_2_attending" value="Joyfully Accept" />
                  <span><span class="pill-label">Joyfully<br />Accept</span></span>
                </label>
                <label class="radio-pill">
                  <input type="radio" name="guest_2_attending" value="Regretfully Decline" />
                  <span><span class="pill-label">Regretfully<br />Decline</span></span>
                </label>
              </div>
            </div>

            <!-- Guest 2's dietary needs - shown once they accept -->
            <div class="field" id="g2-diet" hidden>
              <label for="dietary2">Their dietary requirements or allergies</label>
              <input type="text" id="dietary2" name="dietary_2" placeholder="e.g. vegetarian, vegan, nut allergy, etc." />
            </div>
          </div>

          <div id="attending-extra" hidden>
            <div class="field">
              <label>
                Would you like on-site accommodation? <span class="req">*</span>
                <span class="field-hint">Rooms are limited, so do let us know and we&rsquo;ll be in touch to arrange the details.</span>
              </label>
              <div class="radio-row">
                <label class="radio-pill">
                  <input type="radio" name="accommodation" value="Yes" />
                  <span>Yes</span>
                </label>
                <label class="radio-pill">
                  <input type="radio" name="accommodation" value="No" />
                  <span>No</span>
                </label>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="message">A message for the couple</label>
            <textarea id="message" name="message" placeholder="Anything you&rsquo;d like to tell us…"></textarea>
          </div>

        </div>

        <button type="submit" class="btn btn-primary">Send RSVP</button>
        <p class="form-note">Having trouble? Email us at <a href="mailto:cecandatti@gmail.com">cecandatti@gmail.com</a></p>
      </form>

      <!-- Success state -->
      <div id="rsvp-success" class="form-success reveal">
        <p class="script">Thank you!</p>
        <div class="rule"></div>
        <p id="success-message">Your RSVP has been received.</p>
        <p id="success-cta" style="margin-top:1.5rem"><a class="btn btn-outline" href="travel.html">Travel &amp; Stay</a></p>
      </div>

    </div>
  </section>

  <!-- EXPLORE -->
  <section class="section bg-cream centered" style="padding-top:0.75rem">
    <div class="inner">
      <p class="eyebrow" style="text-align:center;padding-left:0">Explore</p>
      <div class="hero-actions">
        <a class="btn btn-outline" href="index.html">Home</a>
        <a class="btn btn-outline" href="schedule.html">The Big Day</a>
        <a class="btn btn-outline" href="travel.html">Travel &amp; Stay</a>
        <a class="btn btn-outline" href="faq.html">Q&amp;A</a>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <a class="footer-mono" href="index.html">C<span>&amp;</span>A</a>
    <p class="footer-links">
      <a href="rsvp.html">RSVP</a> &middot;
      <a href="schedule.html">The Big Day</a> &middot;
      <a href="travel.html">Travel &amp; Stay</a> &middot;
      <a href="faq.html">Q&amp;A</a>
    </p>
  </footer>

  <script src="js/main.js?v=25"></script>
</body>
</html>
